<!-- Features Strip Section (IklimaPro Style) -->
<section class="features-strip" data-section-id="{{ section.id }}">
    <div class="container">
        <div class="row g-4">
            {% for item in section.items %}
                {% set lang_data = item.data.langs[current_language] %}
                <div class="col-6 col-md-3">
                    <div class="feature-item">
                        {% if item.data.icon %}
                            {{ item.data.icon | safe }}
                        {% else %}
                            <i class="bi bi-check-circle"></i>
                        {% endif %}
                        <div>
                            <h6>{{ item.title }}</h6>
                            {% if item.description %}
                                <small>{{ item.description }}</small>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>
