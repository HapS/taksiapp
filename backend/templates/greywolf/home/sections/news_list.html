<!-- News List Section -->
<div class="container py-5">
  <h2 class="section-title mb-4">{{ section.title }}</h2>
  
  <div class="row">
    {% for item in section.items %}
    <div class="col-md-6 mb-4">
      <div class="card news-card h-100">
        <div class="row g-0">
          {% if item.image %}
          <div class="col-md-4">
            <a href="{{ item.url }}">
              <img src="{{ item.image }}" class="img-fluid rounded-start h-100 object-fit-cover" alt="{{ item.title }}">
            </a>
          </div>
          <div class="col-md-8">
          {% else %}
          <div class="col-12">
          {% endif %}
            <div class="card-body">
              <h5 class="card-title">
                <a href="{{ item.url }}">{{ item.title }}</a>
              </h5>
              {% if item.excerpt %}
              <p class="card-text">{{ item.excerpt | truncate(length=200) }}</p>
              {% endif %}
              {% if item.created_at %}
              <p class="card-text"><small class="text-muted">{{ item.created_at }}</small></p>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
