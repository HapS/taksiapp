<!-- Hero Banner Section -->
<div class="hero-banner py-5 bg-light">
  <div class="container">
    {% for item in section.items %}
    <div class="row align-items-center">
      <div class="col-md-6">
        <h1 class="display-4 fw-bold">{{ item.title }}</h1>
        {% if item.description %}
        <p class="lead">{{ item.description }}</p>
        {% endif %}
        <a href="{{ item.url }}" class="btn btn-primary btn-lg">Detay</a>
      </div>
      {% if item.image %}
      <div class="col-md-6">
        <img src="{{ item.image }}" class="img-fluid rounded" alt="{{ item.title }}">
      </div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>
