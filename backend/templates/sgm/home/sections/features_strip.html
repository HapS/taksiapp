<!-- Features Strip Section -->
<section class="features-strip py-4" data-section-id="{{ section.id }}" style="background-color: {{ section.background_color | default(value='#f8f9fa') }};">
    <div class="container">
        <div class="row g-2 g-md-3">
            {% for item in section.items %}
                {% set lang_data = item.data.langs[current_language] %}
                <div class="col-6 col-md-3">
                    <div class="feature-card bg-white h-100">
                        <div class="feature-icon">
                            {% if item.data.icon %}
                                {{ item.data.icon | safe }}
                            {% else %}
                                <i class="bi bi-check-circle-fill"></i>
                            {% endif %}
                        </div>
                        <div class="feature-content">
                            <h6 class="feature-title">{{ item.title }}</h6>
                            {% if item.description %}
                                <small class="feature-desc text-muted">{{ item.description }}</small>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>

<style>
.features-strip .feature-card {
    border: 1px solid #e9ecef;
    border-radius: 0.5rem;
    padding: 1rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    height: 100%;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.features-strip .feature-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 .25rem .75rem rgba(0,0,0,0.1);
}

.features-strip .feature-icon {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #dc3545;
    color: #fff;
    border-radius: 0.5rem;
    font-size: 1rem;
}

.features-strip .feature-icon i {
    color: #fff;
}

.features-strip .feature-content {
    flex-grow: 1;
}

.features-strip .feature-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #212529;
    margin-bottom: 0.15rem;
    line-height: 1.3;
}

.features-strip .feature-desc {
    font-size: 0.75rem;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

@media (max-width: 767.98px) {
    .features-strip .feature-card {
        padding: 0.85rem;
        gap: 0.6rem;
    }

    .features-strip .feature-icon {
        width: 36px;
        height: 36px;
        font-size: 0.9rem;
    }

    .features-strip .feature-title {
        font-size: 0.8rem;
    }

    .features-strip .feature-desc {
        font-size: 0.7rem;
    }
}
</style>
