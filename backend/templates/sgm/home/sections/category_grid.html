<!-- Category Grid Section (Vocabulary Terms) -->
<div class="container py-5" style="background-color: {{ section.background_color | default(value='transparent') }};">
  <h2 class="section-title mb-4">{{ section.title }}</h2>

  <div class="row">
    {% for item in section.items %}
    <div class="col-md-3 mb-4">
      <div class="card category-card h-100 text-center">
        {% if item.image %}
        <a href="{{ item.url }}">
          <img src="{{ item.image }}" class="card-img-top" alt="{{ item.title }}">
        </a>
        {% endif %}
        <div class="card-body">
          <h5 class="card-title">
            <a href="{{ item.url }}">{{ item.title }}</a>
          </h5>
          {% if item.description %}
          <p class="card-text text-muted">{{ item.description | truncate(length=100) }}</p>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>
