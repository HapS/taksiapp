<div class="row">
    <div class="col-md-6">
        <div class="mb-3">
            <label class="form-label fw-semibold">
                Başlık ([[ langName ]]) *
            </label>
            <input type="text" class="form-control form-control-sm" v-model="form.data[langCode].title" required
                @input="generateSlug(langCode)" />
        </div>
    </div>

    <div class="col-md-6">
        <div class="mb-3">
            <label class="form-label fw-semibold">
                Slug ([[ langName ]]) *
            </label>
            <input type="text" class="form-control form-control-sm" v-model="form.data[langCode].slug" required />
            <div class="form-text">
                URL'de görünecek kısım. Örnek: sayfa-basligi
            </div>
        </div>
    </div>

    <div class="col-md-12">
        <div class="mb-3">
            <label class="form-label fw-semibold">
                <span v-if="form.content_type === 'form'">Form Açıklaması</span>
                <span v-else>Kısa Açıklama</span>
                ([[ langName ]])
            </label>
            <textarea :id="'description_' + langCode" class="form-control form-control-sm" v-model="form.data[langCode].description"></textarea>
            <div class="d-flex justify-content-between align-items-center mt-1">
                <div class="form-text">
                    <span v-if="form.content_type === 'form'">Form hakkında kısa açıklama</span>
                    <span v-else>Kısa açıklama metni</span>
                </div>
                <button
                    type="button"
                    class="btn btn-sm btn-outline-secondary"
                    :id="'toggle_description_editor_' + langCode"
                    @click="toggleDescriptionEditor(langCode)"
                    style="font-size: 0.75rem; padding: 2px 8px;"
                >
                    <i class="bi bi-pencil-square me-1"></i>
                    <span :id="'toggle_description_text_' + langCode">Rich Editor</span>
                </button>
            </div>
        </div>
    </div>

    <div class="col-md-12">
        <div class="mb-3">
            <label class="form-label fw-semibold">
                <span v-if="form.content_type === 'form'">Form İçeriği</span>
                <span v-else>İçerik</span>
                ([[ langName ]])
            </label>
            <textarea :id="'body_' + langCode" class="form-control form-control-sm"></textarea>
            <div v-if="form.content_type === 'form'" class="form-text">
                Form ile ilgili detaylı açıklama, kullanım talimatları vs.
            </div>
        </div>
    </div>
</div>





<!-- Form Fields Section (only for form content type) -->
<div v-if="form.content_type === 'form'" class="card mt-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0">
            <i class="bi bi-ui-checks-grid me-2"></i> Form Alanları Tasarımcısı
        </h6>
        <div class="x-small">Dinamik form alanlarını buradan yönetebilirsiniz</div>
    </div>
    <div class="card-body p-4">
        <form-builder v-model="form.form_settings.fields"></form-builder>
    </div>
</div>

<div v-if="form.content_type !== 'form'" class="mb-3">
    <label class="form-label fw-semibold">
        Meta Başlık ([[ langName ]])
    </label>
    <input type="text" class="form-control form-control-sm" v-model="form.data[langCode].meta_title" />
</div>

<div v-if="form.content_type !== 'form'" class="mb-3">
    <label class="form-label fw-semibold">
        Meta Açıklama ([[ langName ]])
    </label>
    <textarea class="form-control form-control-sm" rows="2" v-model="form.data[langCode].meta_description"></textarea>
</div>
