<!-- Parent Page Selection Modal (Vue app içinde) -->
<div class="modal fade" id="parentPageModal" tabindex="-1" aria-labelledby="parentPageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="parentPageModalLabel">
                    <i class="bi bi-folder-plus"></i> Üst Sayfa Seç
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Search -->
                <div class="mb-3">
                    <input type="text" class="form-control form-control-sm" v-model="parentSearch" @input="searchParentPages" />
                </div>

                <!-- Loading -->
                <div v-if="loadingParents" class="text-center py-4">
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Yükleniyor...</span>
                    </div>
                </div>

                <!-- Pages List -->
                <div v-else class="list-group" style="max-height: 400px; overflow-y: auto;">
                    <button v-for="page in availableParentPages" :key="page.id" type="button"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                        @click="selectParent(page)" :style="{ paddingLeft: (20 + (page._level || 0) * 20) + 'px' }">
                        <div>
                            <i
                                :class="page.children_count > 0 ? 'bi bi-folder-fill text-primary' : 'bi bi-file-earmark-text text-warning'"></i>
                            <strong class="ms-2">[[ getPageTitle(page) ]]</strong>
                            <br>
                            <small class="text-muted ms-4">
                                <span v-if="page.parent_title">
                                    <i class="bi bi-folder"></i> [[ page.parent_title ]]
                                </span>
                                [[ getPageSlug(page) ]]
                            </small>
                        </div>
                        <span v-if="page.children_count > 0" class="badge bg-secondary">
                            [[ page.children_count ]] alt sayfa
                        </span>
                    </button>
                    <div v-if="availableParentPages.length === 0" class="text-center text-muted py-4">
                        <i class="bi bi-search"></i> Sayfa bulunamadı
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-circle"></i> İptal
                </button>
            </div>
        </div>
    </div>
</div>
