<!-- Parent Page Selection -->
<div class="card mb-4" v-if="form.content_type != 'product' && form.content_type != 'form'">
    <div class="card-header">
        <h6 class="m-0"><i class="bi bi-folder"></i> Üst Sayfa</h6>
    </div>
    <div class="card-body">
        <div v-if="parentPage" class="alert alert-info">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <strong>Üst Sayfa:</strong>
                    <p class="mb-0 mt-1">
                        <i class="bi bi-arrow-return-right"></i>
                        [[ getPageTitle(parentPage) ]]
                    </p>
                </div>
                <button class="btn btn-sm btn-outline-danger" @click="removeParent" title="Üst Sayfayı Kaldır">
                    <i class="bi bi-x-circle"></i>
                </button>
            </div>
        </div>
        <div v-else class="text-muted small mb-2">
            <i class="bi bi-info-circle"></i> Bu bir ana sayfadır
        </div>
        <button class="btn btn-sm btn-outline-primary w-100" @click="showParentModal">
            <i class="bi bi-folder-plus"></i>
            [[ parentPage ? 'Üst Sayfayı Değiştir' : 'Üst Sayfa Seç' ]]
        </button>
    </div>
</div>
